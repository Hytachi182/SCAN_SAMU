rules:
  - id: generic-hardcoded-password-assignment
    message: Hardcoded password-like assignment
    severity: WARNING
    languages:
      - generic
    pattern-regex: (?i).*(password|passwd|pwd).*[:=].+

  - id: generic-hardcoded-secret-assignment
    message: Hardcoded secret-like assignment
    severity: WARNING
    languages:
      - generic
    pattern-regex: (?i).*(secret|token|api[_-]?key|apikey).*[:=].+

  - id: generic-default-password-value
    message: Default or placeholder password value
    severity: INFO
    languages:
      - generic
    pattern-regex: (?i).*(password|passwd|pwd).*[:=].*(password|passwd|changeme|changeit|secret|admin|example|sample).*
